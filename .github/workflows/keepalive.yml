name: Keepalive

# GitHub silently disables scheduled workflows after 60 days with no commits to
# the default branch (workflow runs, tags, and releases do NOT count). This job
# makes one tiny commit each week, which resets that 60-day clock for the whole
# repository — keeping the morning brief running indefinitely with no action
# from you. It sustains itself too, since its own commit counts as activity.
#
# ONE-TIME SETUP REQUIRED so the commit can be pushed:
#   Repo Settings -> Actions -> General -> Workflow permissions
#   -> select "Read and write permissions" -> Save.

on:
  schedule:
    - cron: "17 8 * * 1"          # Mondays 08:17 UTC, once a week
      timezone: "America/Los_Angeles"
  workflow_dispatch: {}           # "Run workflow" button for a manual test

permissions:
  contents: write                 # allow this workflow to push the commit

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive marker and commit
        run: |
          mkdir -p .github
          date -u +"last keepalive: %Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git commit -m "chore: keepalive [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push
