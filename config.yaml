# =============================================================================
# Prodigy Fire Weather Brief — configuration
# =============================================================================
# Before the first real run:
#   1. Replace every REPLACE_ME_# with a real FEMS station ID.
#      Get IDs at https://fems.fs2c.usda.gov/download : search a station,
#      click "Copy Data Link", and read the number after stationIds= .
#      Test with:  python fire_weather_brief.py --verify
#   2. Fill in the email block (account the brief is sent FROM).
# The weather and significant_fire_potential sections work out of the box.
# =============================================================================

email:
  smtp_host: smtp.gmail.com          # Google Workspace: smtp.gmail.com
                                     # Microsoft 365:    smtp.office365.com
  smtp_port: 587
  smtp_user: fireweather@prodigywildfire.com
  from_addr: fireweather@prodigywildfire.com
  smtp_password_env: FEMS_SMTP_PASSWORD   # password read from this env var
  to_addrs:
    - michael@prodigywildfire.com
  subject_prefix: "Prodigy Fire Weather Brief"

# The URL the brief gets published to (GitHub Pages, by default
# https://<your-github-username>.github.io/<repo-name>/). Only used to build
# the <title> + Open Graph / Twitter Card tags so links shared in iMessage,
# Slack, etc. show a rich preview (title + logo) instead of a plain link.
# Leave blank to skip preview tags entirely -- never guessed automatically.
site:
  public_url: "https://mrmoseley1776.github.io/Fire-weather-brief/"

data:
  dataset: all               # observation | forecast | all (obs + 7-day forecast)
  fuel_models_default: Y      # NFDRS2016 fuel model (V/W/X/Y/Z)

# Adds Min RH / Max Wind / Max Gust columns pulled from the FEMS weather feed.
# Set enabled: false to drop those columns and skip the extra API calls.
weather:
  enabled: true

# Adds 100-hr / 1000-hr dead fuel moisture (%) columns. These come from the
# same FEMS fire-danger feed already being fetched, so there's no extra API
# call. Note: FEMS provides 1-hr/10-hr/100-hr/1000-hr timelag classes only —
# there is no "10,000-hr" class in NFDRS, so it can't be added.
fuel_moisture:
  enabled: true

# 7-day significant fire potential summary.
# Live section = active NWS Red Flag Warnings + Fire Weather Watches for the
# states below (official api.weather.gov feed, no key needed). Plus links to the
# human-authored Predictive Services 7-day outlooks.
significant_fire_potential:
  enabled: true
  # NWS requires a contact in the request User-Agent; your from address is fine.
  contact_email: fireweather@prodigywildfire.com
  # States scanned for fire alerts (West Coast + Rockies footprint).
  states: [WA, OR, CA, NV, ID, MT, UT, WY, CO, SD]
  predictive_services_links:
    - { label: "National Sitrep (PDF)", url: "https://www.nifc.gov/nicc-files/sitreprt.pdf" }
    - { label: "National 7-Day", url: "https://fsapps.nwcg.gov/psp/npsg/forecast/#/outlooks" }
    - { label: "NW", url: "https://gacc.nifc.gov/nwcc/predict/outlook.aspx" }
    - { label: "N. Cal", url: "https://gacc.nifc.gov/oncc/outlooks.php" }
    - { label: "S. Cal", url: "https://gacc.nifc.gov/oscc/predictive/weather/index.htm" }
    - { label: "Great Basin", url: "https://gacc.nifc.gov/gbcc/" }
    - { label: "N. Rockies", url: "https://gacc.nifc.gov/nrcc/predictive/outlooks/outlooks.htm" }
    - { label: "Rocky Mtn", url: "https://gacc.nifc.gov/rmcc/" }

# Headline numbers pulled from page 1 of the daily NICC Incident Management
# Situation Report (the same PDF linked above): National Preparedness Level,
# new/contained/uncontained large fires, and a one-line PL/incidents/acres
# readout for each of your GACCs. Best-effort: if NICC changes the report's
# layout, this box is silently skipped (the link above still works either way).
national_sitrep:
  enabled: true

# -----------------------------------------------------------------------------
# Coordination centers (GACCs). Add/remove stations freely; "name" is optional
# but helps line up the FEMS response and shows in the brief.
# -----------------------------------------------------------------------------
coordination_centers:

  - code: NWCC
    name: "Northwest — Oregon / Washington"
    fuel_models: Y
    stations:
      - { id: 452138, name: "ENTIAT" }
      - { id: 353115, name: "ILLINOIS VALLEY AIRPORT" }
      - { id: 350728, name: "EAGLE CREEK" }

  - code: ONCC
    name: "Northern California"
    fuel_models: Y
    stations:
      - { id: 40611, name: "REDDING" }
      - { id: 41018, name: "MENDOCINO PASS" }
      - { id: 40217, name: "MT. SHASTA" }

  - code: OSCC
    name: "Southern California"
    fuel_models: X
    stations:
      - { id: 45433, name: "MALIBU HILLS" }
      - { id: 45708, name: "JULIAN" }
      - { id: 55522307, name: "LAKE MATHEWS" }

  - code: GBCC
    name: "Great Basin — NV / UT / S. Idaho"
    fuel_models: Y
    stations:
      - { id: 261702, name: "KYLE CANYON" }
      - { id: 422503, name: "COTTONWOOD MTN" }
      - { id: 102709, name: "MOUNTAIN HOME" }

  - code: NRCC
    name: "Northern Rockies — MT / N. Idaho"
    fuel_models: Y
    stations:
      - { id: 240207, name: "WEST GLACIER" }
