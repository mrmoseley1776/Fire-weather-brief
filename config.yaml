# -----------------------------------------------------------------------------
# OPTIONAL: adjective-class breakpoints per station (station id -> index -> 4
# ascending upper bounds for Low/Moderate/High/Very High). From the station's
# Fire Danger Pocket Card / Operating Plan. Absolute values are not comparable
# between stations, so chips only show where breakpoints are provided.
# -----------------------------------------------------------------------------
thresholds: {}
  # "101222":
  #   erc: [29, 41, 52, 64]
  #   bi:  [30, 55, 80, 110]
